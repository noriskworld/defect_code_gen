    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-accent: #38bdf8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --color-system: #fbbf24;
            --color-subsystem: #22d3ee;
            --color-component: #818cf8;
            --color-function: #34d399;
            --color-failure: #f87171;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graph-container:active {
            cursor: grabbing;
        }

        .node {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: r 0.3s ease, filter 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.2) drop-shadow(0 0 8px var(--primary-accent));
        }

        .link {
            stroke: #94a3b8;
            stroke-opacity: 0.3;
            stroke-width: 1px;
            fill: none;
            transition: stroke-opacity 0.3s ease;
        }

        .node-label {
            font-size: 10px;
            fill: #cbd5e1;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Glassmorphism Sidebar */
        #details-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            max-height: 80%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            overflow-y: auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 100;
            display: none;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #details-panel h2 {
            margin-top: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: var(--primary-accent);
        }

        .detail-item {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--glass-border);
            margin-top: 4px;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 12px;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        #legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        #header h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #header p {
            margin: 4px 0 0 0;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>

        const width = window.innerWidth;
        const height = window.innerHeight;
        const colors = {
            "System": "var(--color-system)",
            "Subsystem": "var(--color-subsystem)",
            "Component": "var(--color-component)",
            "Function": "var(--color-function)",
            "Failure Mode": "var(--color-failure)"
        };

        const svg = d3.select("#graph-container")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        let nodes = [];
        let links = [];
        let simulation;
        let rootData = defectData;

        // --- File Handling ---
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    initGraph(data);
                } catch (err) {
                    alert("Error parsing JSON: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        function initGraph(data) {
            if (simulation) simulation.stop();
            
            // Build the internal tree-like structure for expansion logic
            const allNodesMap = new Map();
            
            // 1. Hierarchy Nodes
            data.hierarchy.forEach(h => {
                const node = {
                    id: h.node_id,
                    name: h.name,
                    type: h.level,
                    description: h.description,
                    parentId: h.parent_id,
                    children: [],
                    _children: [], // For collapsed state
                    collapsed: h.level !== "System" // Collapse by default except root
                };
                allNodesMap.set(node.id, node);
            });

            // 2. Function Nodes
            data.functions.forEach(f => {
                const nodeId = f.function_id;
                const node = {
                    id: nodeId,
                    name: `${f.verb} ${f.noun}`,
                    type: "Function",
                    verb: f.verb,
                    noun: f.noun,
                    children: [],
                    _children: [],
                    collapsed: true
                };
                allNodesMap.set(nodeId, node);
                
                // Link to allocated components
                f.allocations.forEach(alloc => {
                    const parent = allNodesMap.get(alloc.node_id);
                    if (parent) {
                        node.parentId = alloc.node_id;
                        parent.children.push(node);
                    }
                });
            });

            // 3. Failure Mode Nodes
            data.failure_modes.forEach(fm => {
                const nodeId = fm.failure_id;
                const node = {
                    id: nodeId,
                    name: fm.syntactical_description,
                    type: "Failure Mode",
                    detail: fm,
                    children: [],
                    _children: [],
                    collapsed: true
                };
                allNodesMap.set(nodeId, node);
                
                const parent = allNodesMap.get(fm.function_id);
                if (parent) {
                    node.parentId = fm.function_id;
                    parent.children.push(node);
                }
            });

            // Build hierarchy links
            data.hierarchy.forEach(h => {
                if (h.parent_id) {
                    const parent = allNodesMap.get(h.parent_id);
                    const child = allNodesMap.get(h.node_id);
                    if (parent && child) parent.children.push(child);
                }
            });

            // Find roots
            const roots = Array.from(allNodesMap.values()).filter(d => !d.parentId);
            
            // Reset existing state
            nodes = [];
            links = [];
            
            // Initial flattening for visible nodes
            updateGraph(roots);
        }

        function updateGraph(rootNodes) {
            const visibleNodes = [];
            const visibleLinks = [];

            function traverse(d) {
                visibleNodes.push(d);
                if (!d.collapsed && d.children) {
                    d.children.forEach(child => {
                        visibleLinks.push({ source: d.id, target: child.id });
                        traverse(child);
                    });
                }
            }

            rootNodes.forEach(traverse);

            // Re-map nodes to handle D3 force object references
            const d3Nodes = visibleNodes.map(d => {
                const existing = nodes.find(n => n.id === d.id);
                if (existing) {
                    // Preserve position if already exists
                    return Object.assign(existing, d);
                }
                return d;
            });
            nodes = d3Nodes;

            const d3Links = visibleLinks.map(l => {
                return {
                    source: l.source,
                    target: l.target
                };
            });
            links = d3Links;

            render();
        }

        function render() {
            if (simulation) simulation.stop();

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(50))
                .on("tick", ticked);

            // Update links
            const link = g.selectAll(".link")
                .data(links, d => `${d.source.id}-${d.target.id}`);

            link.exit().remove();

            const linkEnter = link.enter()
                .append("line")
                .attr("class", "link");

            const linkMerge = linkEnter.merge(link);

            // Update nodes
            const node = g.selectAll(".node-group")
                .data(nodes, d => d.id);

            node.exit().remove();

            const nodeEnter = node.enter()
                .append("g")
                .attr("class", "node-group")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (event, d) => {
                    handleNodeClick(d);
                });

            nodeEnter.append("circle")
                .attr("class", "node")
                .attr("r", d => d.type === "System" ? 12 : d.type === "Subsystem" ? 9 : 6)
                .attr("fill", d => colors[d.type]);

            nodeEnter.append("text")
                .attr("class", "node-label")
                .attr("dy", 20)
                .attr("text-anchor", "middle")
                .text(d => d.name.length > 20 ? d.name.substring(0, 18) + "..." : d.name);

            const nodeMerge = nodeEnter.merge(node);

            function ticked() {
                linkMerge
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                nodeMerge
                    .attr("transform", d => `translate(${d.x},${d.y})`);
            }
        }

        function handleNodeClick(d) {
            // Expansion logic
            if (d.children && d.children.length > 0) {
                d.collapsed = !d.collapsed;
                const roots = nodes.filter(n => !n.parentId);
                updateGraph(roots);
            }

            // Show details
            showDetails(d);
        }

        function showDetails(d) {
            const panel = d3.select("#details-panel");
            const content = d3.select("#detail-content");
            document.getElementById("detail-title").innerText = d.name;
            
            let html = `
                <div class="detail-item">
                    <div class="detail-label">Type</div>
                    <div class="badge" style="background: ${colors[d.type]}22; color: ${colors[d.type]}">${d.type}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">ID</div>
                    <div class="detail-value">${d.id}</div>
                </div>
            `;

            if (d.description) {
                html += `
                    <div class="detail-item">
                        <div class="detail-label">Description</div>
                        <div class="detail-value">${d.description}</div>
                    </div>
                `;
            }

            if (d.type === "Failure Mode") {
                const fm = d.detail;
                html += `
                    <div class="detail-item">
                        <div class="detail-label">Defect Code</div>
                        <div class="detail-value" style="font-family: monospace; font-weight: bold; color: var(--primary-accent)">${fm.defect_code}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Category</div>
                        <div class="detail-value">${fm.category}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">End Effect</div>
                        <div class="detail-value">${fm.end_effect}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Severity</div>
                        <div class="detail-value">
                            <span style="color: ${fm.severity >= 8 ? '#ef4444' : fm.severity >= 5 ? '#f59e0b' : '#10b981'}">
                                ${fm.severity} / 10
                            </span>
                        </div>
                    </div>
                `;
            }

            content.html(html);
            panel.style("display", "block");
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        function expandAll() {
            function expand(d) {
                d.collapsed = false;
                if (d.children) d.children.forEach(expand);
            }
            const roots = nodes.filter(n => !n.parentId);
            roots.forEach(expand);
            updateGraph(roots);
        }

        function collapseAll() {
            function collapse(d) {
                if (d.type !== "System") d.collapsed = true;
                if (d.children) d.children.forEach(collapse);
            }
            const roots = nodes.filter(n => !n.parentId);
            roots.forEach(collapse);
            updateGraph(roots);
        }

        window.addEventListener("resize", () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        // Start initialization
        initGraph(defectData);

    </script>
